name: 'Terraform container action'
description: 'Demonstration'
author: 'khaiwah'
inputs:
  ARM_CLIENT_ID:
    description: 'Azure client id'
    required: true
  ARM_CLIENT_SECRET:
    description: 'Azure client secret'
    required: true
  ARM_SUBSCRIPTION_ID:
    description: 'Azure subscription ID'
    required: true
  ARM_TENANT_ID:
    description: 'Azure tenant ID'
    required: true
  STATE_KEY:
    description: 'Personal identification'
    required: true
  TF_STAGE:
    description: 'Django secret key to start'
    required: true
  DJANGO_SECRET_KEY_PROD:
    description: 'Django secret key'
    required: false
runs:
  using: 'docker'
  image: 'Dockerfile'
